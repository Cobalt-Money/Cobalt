name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Workflow-level least privilege. Only `commit-generated` overrides this
# to `contents: write` for pushing the regenerated spec back to PR branches.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint (ultracite)
        # ultracite spawns the oxlint Rust binary, which shells out to Node to
        # evaluate `oxlint.config.ts`. Node has no native TS loader, so we
        # register `tsx` via NODE_OPTIONS before the lint step runs. Tracked
        # in SRI-341 as a CI hardening follow-up to PR #260.
        run: bun x ultracite check apps packages
        env:
          NODE_OPTIONS: --import tsx

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck (turbo)
        run: bun x turbo check-types
        env:
          NODE_OPTIONS: --max-old-space-size=8192

  build-spec:
    name: Build OpenAPI spec + docs
    # Don't regenerate the spec if types are broken — would just produce a
    # spec from broken code.
    needs: [typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Need previous commit to oasdiff against on PRs (fetch base ref).
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Stash base ref openapi.json (for oasdiff)
        # Capture the pre-change spec from the PR's base branch (or HEAD~1
        # on main pushes) before regen overwrites it. Skip silently if the
        # file didn't exist in the base ref — first-time spec gen.
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        run: |
          base_ref="${{ github.event.pull_request.base.sha || 'HEAD~1' }}"
          if git show "$base_ref:apps/server/openapi.json" > /tmp/base-openapi.json 2>/dev/null; then
            echo "Captured base openapi.json from $base_ref"
          else
            echo "No base openapi.json — skipping oasdiff."
            rm -f /tmp/base-openapi.json
          fi
      - name: Regenerate openapi.json
        # Spec is the single source of truth for SDK + docs codegen. CI rebuilds
        # it from source on every PR so contributors never have to remember to
        # run a local script.
        #
        # The script imports the v1 router which transitively module-loads
        # Stripe / Plaid / SnapTrade / Better Auth clients. They construct
        # eagerly and throw without env. Mirror the integration-test dummy
        # block so module load succeeds without touching any real provider.
        env:
          # Intentionally NOT setting SKIP_ENV_VALIDATION: env transforms (like
          # commaList for TRUSTED_ORIGINS_EXTRA) only run when validation is on,
          # and downstream code spreads those arrays. Skipping validation leaves
          # them undefined → spread throws.
          AI_GATEWAY_API_KEY: test-ai-gateway-key
          APPLE_APP_BUNDLE_IDENTIFIER: test.bundle.id
          APPLE_KEY_ID: test-key-id
          # P-256 PKCS8 dummy key generated via `openssl genpkey -algorithm EC
          # -pkeyopt ec_paramgen_curve:P-256`. Not a real Apple key; only used
          # because packages/auth eagerly signs an ES256 JWT at module load.
          # TODO: refactor packages/auth to lazy-init Apple/Stripe clients.
          APPLE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nMIIBeQIBADCCAQMGByqGSM49AgEwgfcCAQEwLAYHKoZIzj0BAQIhAP////8AAAAB\nAAAAAAAAAAAAAAAA////////////////MFsEIP////8AAAABAAAAAAAAAAAAAAAA\n///////////////8BCBaxjXYqjqT57PrvVV2mIa8ZR0GsMxTsPY7zjw+J9JgSwMV\nAMSdNgiG5wSTamZ44ROdJreBn36QBEEEaxfR8uEsQkf4vOblY6RA8ncDfYEt6zOg\n9KE5RdiYwpZP40Li/hp/m47n60p8D54WK84zV2sxXs7LtkBoN79R9QIhAP////8A\nAAAA//////////+85vqtpxeehPO5ysL8YyVRAgEBBG0wawIBAQQgp+lwAaUJ1jms\na4zIKYhfgVC+T+ZsY+Pbl77mWtSR/NShRANCAASlypaSz72mmvsx2Tsf7li68iZZ\nFdVeysivRbFaofkCJzGWuQ4RJ+Vvqlc6NpogWK9sm5CAPv5x640Wnm2H7PSo\n-----END PRIVATE KEY-----"
          APPLE_SERVICE_ID: test-service-id
          APPLE_TEAM_ID: test-team-id
          BETTER_AUTH_SECRET: test-secret-that-is-at-least-32-characters-long
          BETTER_AUTH_URL: http://localhost:4000
          BLOB_READ_WRITE_TOKEN: vercel_blob_rw_test_token
          CORS_ORIGIN: http://localhost:3000
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/cobalt
          GOOGLE_CLIENT_ID: test-google-client
          GOOGLE_CLIENT_SECRET: test-google-secret
          GOOGLE_IOS_CLIENT_ID: test-google-ios-client
          PLAID_CLIENT_ID: test-plaid-client
          PLAID_CLIENT_SECRET: test-plaid-secret
          PLAID_ENV: sandbox
          SNAPTRADE_CLIENT_ID: test-snaptrade-client
          SNAPTRADE_CONSUMER_KEY: test-snaptrade-key
          STOCK_NEWS_API_KEY: test-stock-news
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_test_dummy
        working-directory: apps/server
        run: bun run generate-spec
      - name: Regenerate fumadocs API reference
        # MDX derived from the spec we just wrote, so it stays in lockstep.
        # No live URL fetch — fumadocs reads ../server/openapi.json directly.
        working-directory: apps/fumadocs
        run: bun run scripts/generate-docs.ts
      - name: Diff OpenAPI for breaking changes
        # Warns on PR with breaking-change details. `--fail-on ERR` flips this
        # to a hard failure once the noise level is calibrated (see follow-up).
        if: hashFiles('/tmp/base-openapi.json') != ''
        run: |
          docker run --rm \
            -v "$PWD/apps/server/openapi.json:/specs/new.json:ro" \
            -v "/tmp/base-openapi.json:/specs/old.json:ro" \
            tufin/oasdiff:v1.16.0 breaking /specs/old.json /specs/new.json --format text || \
          echo "::warning::oasdiff flagged breaking changes (see above). Not failing build yet."
      - name: Upload regenerated spec + docs as artifact
        # commit-generated downloads + pushes; sdk-dispatch / consumers can
        # also download via this name.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: generated-spec
          path: |
            apps/server/openapi.json
            apps/fumadocs/content/docs/api-reference
          retention-days: 7

  commit-generated:
    name: Commit regenerated spec + docs
    # Only this job needs write — keep blast radius tiny.
    needs: [build-spec, test, test-integration]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Default checkout uses the merge ref; `git-auto-commit` below then
          # runs `git checkout <head_ref>` to push the regen back. If the
          # working tree is dirty from the artifact extraction the checkout
          # aborts with "would be overwritten". Check out the PR head ref
          # directly so we never switch branches with a dirty tree.
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: generated-spec
          # upload-artifact@v7 strips the common ancestor from input paths
          # (here `apps/`), so the archive contains `server/openapi.json` and
          # `fumadocs/...`. Extract under `apps/` to restore the real paths;
          # without this the regenerated files land at the repo root and the
          # auto-commit below sees a clean tree and no-ops.
          path: apps
      - name: Verify regenerated files landed at expected paths
        # Tripwire — if upload-artifact's common-ancestor behavior changes or
        # the upload path list gains/loses entries, this catches it before
        # the silent no-op.
        run: |
          test -f apps/server/openapi.json
          test -d apps/fumadocs/content/docs/api-reference
      - name: Commit regenerated spec + docs to PR branch
        # No `[skip ci]` marker here. Per GitHub docs the marker is matched
        # anywhere in the commit message — including after a squash-merge,
        # where the bot's commit message gets concatenated into the squash
        # and the marker silently suppresses all workflows on main. Recursion
        # is already prevented because GITHUB_TOKEN-authored commits don't
        # trigger new workflow runs:
        #   https://docs.github.com/en/actions/concepts/security/github_token
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9  # v7.1.0
        with:
          file_pattern: "apps/server/openapi.json apps/fumadocs/content/docs/api-reference"
          commit_message: "chore: sync openapi.json + docs"

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run tests
        run: bun x turbo test

  test-integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    # Mirrors the local stub in apps/server/test-setup.ts so Nitro boots in
    # CI without real provider creds. Anything talking to a network must be
    # mocked at the test level (no real Plaid/SnapTrade/Stripe calls).
    env:
      AI_GATEWAY_API_KEY: test-ai-gateway-key
      APPLE_APP_BUNDLE_IDENTIFIER: test.bundle.id
      APPLE_KEY_ID: test-key-id
      APPLE_PRIVATE_KEY: test-private-key
      APPLE_SERVICE_ID: test-service-id
      APPLE_TEAM_ID: test-team-id
      BETTER_AUTH_SECRET: test-secret-that-is-at-least-32-characters-long
      BETTER_AUTH_URL: http://localhost:4000
      BLOB_READ_WRITE_TOKEN: vercel_blob_rw_test_token
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/cobalt
      GOOGLE_CLIENT_ID: test-google-client
      GOOGLE_CLIENT_SECRET: test-google-secret
      GOOGLE_IOS_CLIENT_ID: test-google-ios-client
      LOCAL_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/cobalt
      PLAID_CLIENT_ID: test-plaid-client
      PLAID_CLIENT_SECRET: test-plaid-secret
      PLAID_ENV: sandbox
      SNAPTRADE_CLIENT_ID: test-snaptrade-client
      SNAPTRADE_CONSUMER_KEY: test-snaptrade-key
      STOCK_NEWS_API_KEY: test-stock-news
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_test_dummy
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cobalt
        ports:
          - 5433:5432
        # Wait until Postgres accepts connections before steps run; without
        # this the migrate step races the container startup.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Apply schema to CI Postgres (drizzle-kit push)
        # New DBs (CI, local docker, future ephemeral branches) get the
        # current declared schema applied directly via `push`. The post-squash
        # init migration is a commented-out baseline that won't apply to a
        # fresh DB; `push` is the canonical drizzle pattern for fresh setup.
        env:
          SKIP_ENV_VALIDATION: "1"
        run: bun x drizzle-kit push --force --config packages/db/drizzle.config.ts
      - name: Run integration tests (server)
        # Don't bail at first failure — surface the full picture so we can
        # tell whether the spawn / env / DB or a specific test is broken.
        run: bun --cwd apps/server run test:integration
        continue-on-error: true
        id: integration
      - name: Fail job if integration tests failed
        if: steps.integration.outcome == 'failure'
        run: |
          echo "::warning::Integration tests failed — see logs above."
          exit 1

  deploy-preview:
    name: Deploy preview (${{ matrix.project }})
    # Gate every PR preview on CI signal. Vercel Git auto-deploy is disabled
    # in the dashboard for cobalt-{docs,server,web} so this is the only path
    # that ships a build.
    #
    # Skip on Dependabot PRs: GitHub does not expose `secrets.*` to PRs
    # authored by Dependabot (security fix post-Codecov 2021), so
    # VERCEL_TOKEN is empty and `vercel pull` errors with "No existing
    # credentials found". Dependabot PRs don't need previews anyway.
    needs: [lint, typecheck, test, test-integration]
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: docs
            dir: apps/fumadocs
            project_id_secret: VERCEL_DOCS_PROJECT_ID
          - project: server
            dir: apps/server
            project_id_secret: VERCEL_SERVER_PROJECT_ID
          - project: web
            dir: apps/web
            project_id_secret: VERCEL_WEB_PROJECT_ID
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[matrix.project_id_secret] }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      # Vercel cloud sets NITRO_PRESET=vercel automatically; GH Actions does
      # not. Without this, apps/server builds with preset node-server and
      # emits .output/ instead of .vercel/output/ (Build Output API v3),
      # which `vercel build` rejects with "No Output Directory named public".
      # Harmless for docs/web (non-Nitro).
      NITRO_PRESET: vercel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          # Match Vercel project Node setting (24.x in dashboard for all 3
          # cobalt projects). Mismatch makes `vercel build` reject the build.
          node-version: 24
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Vercel CLI
        run: npm install -g vercel@54
      - name: Pull Vercel env (preview)
        # Run from repo root. Each project has Root Directory configured in
        # the Vercel dashboard (apps/web, apps/server, apps/fumadocs); running
        # from subdir double-applies that prefix → "Build src is package.json".
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
      - name: Build
        run: vercel build --token=$VERCEL_TOKEN
      - name: Deploy prebuilt -> preview
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview (${{ matrix.project }}): $url"
      - name: Stash URL for aggregator
        # Matrix legs can't share outputs directly; persist each URL as a
        # named artifact, then comment-previews aggregates all three.
        run: |
          mkdir -p preview-urls
          echo "${{ steps.deploy.outputs.url }}" > preview-urls/${{ matrix.project }}.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: preview-url-${{ matrix.project }}
          path: preview-urls/${{ matrix.project }}.txt
          retention-days: 1

  comment-previews:
    name: Post preview URLs to PR
    needs: [deploy-preview]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: preview-url-*
          path: preview-urls
          merge-multiple: true
      - name: Upsert PR comment
        # HTML marker makes the comment idempotent: subsequent runs find it
        # via list-comments and PATCH in place instead of spamming the PR.
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const projects = ['docs', 'server', 'web'];
            const urls = Object.fromEntries(projects.map(p => {
              const path = `preview-urls/${p}.txt`;
              return [p, fs.existsSync(path) ? fs.readFileSync(path, 'utf8').trim() : null];
            }));
            const marker = '<!-- vercel-preview-urls -->';
            const body = [
              marker,
              '### Vercel previews',
              '',
              '| Project | URL |',
              '| --- | --- |',
              ...projects.map(p => `| \`cobalt-${p}\` | ${urls[p] ? urls[p] : '_failed_'} |`),
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }

  deploy-prod:
    name: Deploy production (${{ matrix.project }})
    # Same gate, only for merges to main. Same matrix so all three sites
    # promote together — keeps server/web/docs in lockstep on schema changes.
    needs: [lint, typecheck, test, test-integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: docs
            dir: apps/fumadocs
            project_id_secret: VERCEL_DOCS_PROJECT_ID
          - project: server
            dir: apps/server
            project_id_secret: VERCEL_SERVER_PROJECT_ID
          - project: web
            dir: apps/web
            project_id_secret: VERCEL_WEB_PROJECT_ID
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[matrix.project_id_secret] }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      NITRO_PRESET: vercel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Vercel CLI
        run: npm install -g vercel@54
      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
      - name: Build (production)
        run: vercel build --prod --token=$VERCEL_TOKEN
      - name: Deploy prebuilt -> production
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  sdk-dispatch:
    name: Dispatch SDK gen
    # Two gates AND'd together:
    #   1. all upstream jobs green (via `needs`) — incl. build-spec so we
    #      know the regenerated spec is shippable before SDK fan-out.
    #   2. push to main AND apps/server/openapi.json actually changed
    # Third implicit gate lives in Cobalt-Typescript-SDK's sync.yml — if the
    # regenerated SDK files have no diff, peter-evans skips PR creation.
    needs: [build-spec, test, test-integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Need previous commit to diff openapi.json against.
          fetch-depth: 2
      - name: Skip if openapi.json did not change
        id: spec
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^apps/server/openapi.json$"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Fire repository_dispatch on Cobalt-Typescript-SDK
        if: steps.spec.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.SDK_DISPATCH_TOKEN }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            /repos/Cobalt-Money/Cobalt-Typescript-SDK/dispatches \
            -f event_type=spec-updated
