name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Workflow-level least privilege. Only `commit-generated` overrides this
# to `contents: write` for pushing the regenerated spec back to PR branches.
permissions:
  contents: read

# Turbo remote cache (Vercel-hosted). Empty when TURBO_TOKEN secret unset —
# turbo silently falls back to local cache, no failure.
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      server: ${{ steps.filter.outputs.server }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            server:
              - 'apps/server/**'
              - 'packages/**'
              - 'bun.lock'
            code:
              - 'apps/**'
              - 'packages/**'
              - 'bun.lock'
              - '.github/**'

  lint-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup
      - name: Lint (ultracite)
        # ultracite spawns the oxlint Rust binary, which shells out to Node to
        # evaluate `oxlint.config.ts`. Node has no native TS loader, so register
        # `tsx` via NODE_OPTIONS. SRI-341.
        run: bun x ultracite check apps packages
        env:
          NODE_OPTIONS: --import tsx
      - name: Typecheck (turbo)
        run: bun x turbo check-types
        env:
          NODE_OPTIONS: --max-old-space-size=8192
      - name: Security audit
        # Surfaces advisories without blocking — repo currently carries a
        # backlog of transitive high/critical from vitest, wrangler, nitro,
        # fumadocs etc. Flip to a hard fail once those are cleaned up via
        # `bun update`; tracked as a CI hardening follow-up.
        run: bun audit --audit-level=high || echo "::warning::bun audit flagged advisories (see above). Not failing build yet."

  build-spec:
    name: Build OpenAPI spec + docs
    needs: [lint-typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Need base sha to oasdiff against; depth 2 covers push, base sha is
          # fetched separately for PRs.
          fetch-depth: 2
      - uses: ./.github/actions/setup
      - name: Stash base ref openapi.json (for oasdiff)
        run: |
          base_ref="${{ github.event.pull_request.base.sha || 'HEAD~1' }}"
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            git fetch --depth=1 origin "$base_ref" || true
          fi
          if git show "$base_ref:apps/server/openapi.json" > /tmp/base-openapi.json 2>/dev/null; then
            echo "Captured base openapi.json from $base_ref"
          else
            echo "No base openapi.json — skipping oasdiff."
            rm -f /tmp/base-openapi.json
          fi
      - name: Regenerate openapi.json
        # Spec is the single source of truth for SDK + docs codegen. Module load
        # eagerly constructs Stripe/Plaid/SnapTrade/Better Auth clients, so we
        # mirror the integration-test dummy env block.
        env:
          # Not SKIP_ENV_VALIDATION: env transforms (commaList for
          # TRUSTED_ORIGINS_EXTRA) only run when validation is on; downstream
          # code spreads those arrays.
          AI_GATEWAY_API_KEY: test-ai-gateway-key
          APPLE_APP_BUNDLE_IDENTIFIER: test.bundle.id
          APPLE_KEY_ID: test-key-id
          # P-256 PKCS8 dummy key. Not real; packages/auth eagerly signs an
          # ES256 JWT at module load. TODO: lazy-init Apple/Stripe clients.
          APPLE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nMIIBeQIBADCCAQMGByqGSM49AgEwgfcCAQEwLAYHKoZIzj0BAQIhAP////8AAAAB\nAAAAAAAAAAAAAAAA////////////////MFsEIP////8AAAABAAAAAAAAAAAAAAAA\n///////////////8BCBaxjXYqjqT57PrvVV2mIa8ZR0GsMxTsPY7zjw+J9JgSwMV\nAMSdNgiG5wSTamZ44ROdJreBn36QBEEEaxfR8uEsQkf4vOblY6RA8ncDfYEt6zOg\n9KE5RdiYwpZP40Li/hp/m47n60p8D54WK84zV2sxXs7LtkBoN79R9QIhAP////8A\nAAAA//////////+85vqtpxeehPO5ysL8YyVRAgEBBG0wawIBAQQgp+lwAaUJ1jms\na4zIKYhfgVC+T+ZsY+Pbl77mWtSR/NShRANCAASlypaSz72mmvsx2Tsf7li68iZZ\nFdVeysivRbFaofkCJzGWuQ4RJ+Vvqlc6NpogWK9sm5CAPv5x640Wnm2H7PSo\n-----END PRIVATE KEY-----"
          APPLE_SERVICE_ID: test-service-id
          APPLE_TEAM_ID: test-team-id
          BETTER_AUTH_SECRET: test-secret-that-is-at-least-32-characters-long
          BETTER_AUTH_URL: http://localhost:4000
          BLOB_READ_WRITE_TOKEN: vercel_blob_rw_test_token
          CORS_ORIGIN: http://localhost:3000
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/cobalt
          GOOGLE_CLIENT_ID: test-google-client
          GOOGLE_CLIENT_SECRET: test-google-secret
          GOOGLE_IOS_CLIENT_ID: test-google-ios-client
          PLAID_CLIENT_ID: test-plaid-client
          PLAID_CLIENT_SECRET: test-plaid-secret
          PLAID_ENV: sandbox
          SNAPTRADE_CLIENT_ID: test-snaptrade-client
          SNAPTRADE_CONSUMER_KEY: test-snaptrade-key
          STOCK_NEWS_API_KEY: test-stock-news
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_test_dummy
        working-directory: apps/server
        run: bun run generate-spec
      - name: Regenerate fumadocs API reference
        working-directory: apps/fumadocs
        run: bun run scripts/generate-docs.ts
      - name: Diff OpenAPI for breaking changes
        if: hashFiles('/tmp/base-openapi.json') != ''
        uses: oasdiff/oasdiff-action/breaking@143743fa1c823e5242c56ca81e656837faefe5a0  # v0.0.49
        with:
          base: /tmp/base-openapi.json
          revision: apps/server/openapi.json
          fail-on-diff: false
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: generated-spec
          path: |
            apps/server/openapi.json
            apps/fumadocs/content/docs/api-reference
          retention-days: 7

  commit-generated:
    name: Commit regenerated spec + docs
    needs: [build-spec, test, test-integration]
    # always(): test-integration may skip on non-server changes; still commit
    # the regen if build-spec + test passed.
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      needs.build-spec.result == 'success' &&
      needs.test.result == 'success' &&
      (needs.test-integration.result == 'success' || needs.test-integration.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Check out PR head directly so git-auto-commit doesn't switch
          # branches with a dirty tree (artifact extraction).
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: generated-spec
          # upload-artifact@v7 strips common ancestor (`apps/`) — extract back
          # under apps/ to restore real paths.
          path: apps
      - name: Verify regenerated files landed at expected paths
        run: |
          test -f apps/server/openapi.json
          test -d apps/fumadocs/content/docs/api-reference
      - name: Commit regenerated spec + docs to PR branch
        # No `[skip ci]` marker — it suppresses workflows post-squash. Recursion
        # already prevented because GITHUB_TOKEN-authored commits don't trigger
        # new workflow runs.
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9  # v7.1.0
        with:
          file_pattern: "apps/server/openapi.json apps/fumadocs/content/docs/api-reference"
          commit_message: "chore: sync openapi.json + docs"

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup
      - run: bun x turbo test

  test-integration:
    name: Integration tests (Postgres)
    needs: [changes]
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    env:
      AI_GATEWAY_API_KEY: test-ai-gateway-key
      APPLE_APP_BUNDLE_IDENTIFIER: test.bundle.id
      APPLE_KEY_ID: test-key-id
      APPLE_PRIVATE_KEY: test-private-key
      APPLE_SERVICE_ID: test-service-id
      APPLE_TEAM_ID: test-team-id
      BETTER_AUTH_SECRET: test-secret-that-is-at-least-32-characters-long
      BETTER_AUTH_URL: http://localhost:4000
      BLOB_READ_WRITE_TOKEN: vercel_blob_rw_test_token
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/cobalt
      GOOGLE_CLIENT_ID: test-google-client
      GOOGLE_CLIENT_SECRET: test-google-secret
      GOOGLE_IOS_CLIENT_ID: test-google-ios-client
      LOCAL_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/cobalt
      PLAID_CLIENT_ID: test-plaid-client
      PLAID_CLIENT_SECRET: test-plaid-secret
      PLAID_ENV: sandbox
      SNAPTRADE_CLIENT_ID: test-snaptrade-client
      SNAPTRADE_CONSUMER_KEY: test-snaptrade-key
      STOCK_NEWS_API_KEY: test-stock-news
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_test_dummy
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cobalt
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup
      - name: Apply schema to CI Postgres (drizzle-kit push)
        env:
          SKIP_ENV_VALIDATION: "1"
        run: bun x drizzle-kit push --force --config packages/db/drizzle.config.ts
      - name: Run integration tests (server)
        run: bun --cwd apps/server run test:integration

  sdk-dispatch:
    name: Dispatch SDK gen
    # All upstream green + spec actually changed on this main push. Third gate
    # in Cobalt-Typescript-SDK's sync.yml: peter-evans skips PR creation if no
    # SDK diff.
    needs: [build-spec, test, test-integration]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.build-spec.result == 'success' &&
      needs.test.result == 'success' &&
      (needs.test-integration.result == 'success' || needs.test-integration.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 2
      - name: Skip if openapi.json did not change
        id: spec
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^apps/server/openapi.json$"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Fire repository_dispatch on Cobalt-Typescript-SDK
        if: steps.spec.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.SDK_DISPATCH_TOKEN }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            /repos/Cobalt-Money/Cobalt-Typescript-SDK/dispatches \
            -f event_type=spec-updated
