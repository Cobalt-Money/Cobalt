name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint (ultracite)
        # ultracite spawns the oxlint Rust binary, which shells out to Node to
        # evaluate `oxlint.config.ts`. Node has no native TS loader, so we
        # register `tsx` via NODE_OPTIONS before the lint step runs. Tracked
        # in SRI-341 as a CI hardening follow-up to PR #260.
        run: bun x ultracite check apps packages
        env:
          NODE_OPTIONS: --import tsx
      - name: Typecheck (turbo)
        run: bun x turbo check-types
        env:
          NODE_OPTIONS: --max-old-space-size=8192

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run tests
        run: bun x turbo test
