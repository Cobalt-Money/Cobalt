name: SDK gen

on:
  push:
    branches: [main]
    paths:
      - "apps/server/src/api/public/v1/**"
      - "packages/server-data/src/**/*.public.ts"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Fire repository_dispatch on Cobalt-Typescript-SDK
        env:
          GH_TOKEN: ${{ secrets.SDK_DISPATCH_TOKEN }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            /repos/Cobalt-Money/Cobalt-Typescript-SDK/dispatches \
            -f event_type=spec-updated
