name: Deploy sandbox-worker

on:
  push:
    branches: [main]
    paths:
      - "apps/sandbox-worker/**"
      - ".github/workflows/deploy-sandbox-worker.yml"

# Avoid concurrent deploys racing each other.
concurrency:
  group: deploy-sandbox-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      # Wrangler 4 requires Node >= 22. `ubuntu-latest` ships Node 20 in some
      # runner images; pin so the wrangler CLI works.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      # Run wrangler directly via the workspace install. The
      # `cloudflare/wrangler-action@v3` wrapper re-installs wrangler with
      # `npm i`, which fails on this repo because root `package.json` uses
      # Bun's `catalog:` protocol that npm cannot parse.
      - name: Deploy to Cloudflare
        run: bun x wrangler deploy
        working-directory: apps/sandbox-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Smoke test: anonymous POST must return 401. Catches a deploy that
      # accidentally bypasses the auth wrapper.
      - name: Smoke test auth
        run: |
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
            https://cobalt-sandbox.sriketk5.workers.dev \
            -H "Content-Type: application/json" \
            -d '{"code":"return 1","tools":[]}')
          echo "Anonymous POST returned: $STATUS"
          if [ "$STATUS" != "401" ]; then
            echo "::error::Smoke test failed: expected 401, got $STATUS"
            exit 1
          fi
