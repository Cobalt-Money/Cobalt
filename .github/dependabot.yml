version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"

  - package-ecosystem: npm
    directories:
      - "/"
      - "/apps/*"
      - "/packages/*"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: "deps"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@rocicorp/zero"
